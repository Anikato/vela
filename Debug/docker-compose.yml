x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: vela-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vela
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: ${DB_PASSWORD:-VelaSecure2026}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    logging: *default-logging

  app:
    image: ${VELA_IMAGE:-l97312/vela:latest}
    container_name: vela-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${APP_PORT:-127.0.0.1:3000}:3000'
    environment:
      DATABASE_URL: postgresql://vela:${DB_PASSWORD:-VelaSecure2026}@db:5432/vela
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      SMTP_ENCRYPTION_KEY: ${SMTP_ENCRYPTION_KEY:-}
    volumes:
      - ./data/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/db || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
    logging: *default-logging

  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: vela-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: vela
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: ${DB_PASSWORD:-VelaSecure2026}
      SCHEDULE: "0 2 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./data/backups:/backups
    logging: *default-logging

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: vela-uptime
    restart: unless-stopped
    ports:
      - '${UPTIME_PORT:-127.0.0.1:3001}:3001'
    volumes:
      - ./data/uptime-kuma:/app/data
    logging: *default-logging
